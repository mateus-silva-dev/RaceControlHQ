name: 🚀 Java CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: 🔨 Build + Testes
        run: mvn clean verify

      - name: 📊 Upload relatório de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  coverage:
    name: 📈 Code Coverage (JaCoCo)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 📊 Gerar cobertura
        run: mvn test jacoco:report

      - name: 📤 Upload cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/

      - name: 📊 Gerar badge de cobertura
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: target/site/jacoco/jacoco.csv
          badges-directory: badges
          generate-branches-badge: true
          generate-coverage-endpoint: true
          coverage-label: "COVERAGE"

      - name: 📤 Commit do badge e endpoint
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: update coverage badges and endpoints"
          add: "badges/*"

      - name: 📂 Publicar cobertura no Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site/jacoco

